name: Scheduled Release

on:
    schedule:
        - cron: "0 0 * * 2"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    check_new_commits:
        runs-on: ubuntu-latest
        outputs:
            has-changes: ${{ steps.check_commits.outputs.has-changes }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  fetch-depth: 0

            - name: Check for new commits
              id: check_commits
              uses: isaac-cf-wong/detect-git-changes-action@484da6639676d11009fc70cf1a09b73d31737fe9 # v0.0.13
              with:
                  use-latest-tag: true

    ci:
        needs: check_new_commits
        if: ${{ needs.check_new_commits.outputs.has-changes == 'true' }}
        uses: ./.github/workflows/ci.yml

    create_tag:
        needs: ci
        runs-on: ubuntu-latest
        outputs:
            new_tag: ${{ steps.tag_version.outputs.new_tag }}
            new_version: ${{ steps.tag_version.outputs.new_version }}
        steps:
            - name: Create release GitHub App token
              id: release_app_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
              with:
                  client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
                  private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
                  permission-contents: write

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  fetch-depth: 0
                  token: ${{ steps.release_app_token.outputs.token }}

            - name: Get release GitHub App user ID
              id: release_app_user
              run: echo "user_id=$(gh api "/users/${{ steps.release_app_token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
              env:
                  GH_TOKEN: ${{ steps.release_app_token.outputs.token }}

            - name: Install git-cliff
              uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
              with:
                  tool: git-cliff

            - name: Install Rust
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  toolchain: stable

            - name: Bump crate version and push tag
              id: tag_version
              run: |
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
                  if [ "$PREVIOUS_TAG" = "none" ]; then
                    NEW_TAG="v0.1.0"
                  else
                    NEW_TAG=$(git-cliff --bumped-version --config cliff.toml 2>/dev/null)
                  fi
                  if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
                    echo "Creating annotated tag $NEW_TAG"

                    git config user.name "${{ steps.release_app_token.outputs.app-slug }}[bot]"
                    git config user.email "${{ steps.release_app_user.outputs.user_id }}+${{ steps.release_app_token.outputs.app-slug }}[bot]@users.noreply.github.com"

                    NEW_VERSION="${NEW_TAG#v}"
                    NEW_VERSION="$NEW_VERSION" python3 - <<'PY'
                  import os
                  from pathlib import Path

                  cargo_toml = Path("Cargo.toml")
                  version = os.environ["NEW_VERSION"]
                  lines = cargo_toml.read_text(encoding="utf-8").splitlines(keepends=True)

                  in_package = False
                  updated = False
                  for index, line in enumerate(lines):
                      stripped = line.strip()
                      if stripped == "[package]":
                          in_package = True
                          continue
                      if in_package and stripped.startswith("["):
                          break
                      if in_package and stripped.startswith("version = "):
                          newline = "\n" if line.endswith("\n") else ""
                          lines[index] = f'version = "{version}"{newline}'
                          updated = True
                          break

                  if not updated:
                      raise SystemExit("Could not find [package] version in Cargo.toml")

                  cargo_toml.write_text("".join(lines), encoding="utf-8")
                  PY
                    cargo generate-lockfile

                    if ! git diff --quiet -- Cargo.toml Cargo.lock; then
                      git add Cargo.toml Cargo.lock
                      git commit -m "chore(release): prepare for $NEW_TAG [skip ci]"
                      git push origin "HEAD:${GITHUB_REF_NAME}"
                    else
                      echo "Cargo.toml and Cargo.lock already match $NEW_TAG"
                    fi

                    git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
                    git push origin "$NEW_TAG"
                  else
                    echo "Tag $NEW_TAG already exists, skipping."
                    exit 1
                  fi
                  echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
                  echo "new_version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
                  echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

            - name: Output tag information
              run: |
                  echo "### Tag Created" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **New tag**: ${{ steps.tag_version.outputs.new_tag }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Crate version**: ${{ steps.tag_version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Previous tag**: ${{ steps.tag_version.outputs.previous_tag }}" >> "$GITHUB_STEP_SUMMARY"

    release:
        needs: create_tag
        uses: ./.github/workflows/release.yml
        permissions:
            contents: write
        with:
            tag_name: ${{ needs.create_tag.outputs.new_tag }}

    publish:
        needs: [create_tag, release]
        uses: ./.github/workflows/publish.yml
        secrets: inherit
        with:
            tag_name: ${{ needs.create_tag.outputs.new_tag }}
            # Template safety switch. Change to `true` in a real package after
            # configuring the `crates-io` environment and `CARGO_REGISTRY_TOKEN`.
            publish: false
