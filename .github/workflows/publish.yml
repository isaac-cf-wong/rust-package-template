name: Publish

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Tag name for the publish (e.g., v1.2.3)"
                required: true
                type: string
            publish:
                description: "Publish to crates.io"
                required: true
                default: false
                type: boolean
    workflow_call:
        inputs:
            tag_name:
                description: "Tag name for the publish (e.g., v1.2.3)"
                required: true
                type: string
            publish:
                description: "Publish to crates.io"
                required: false
                default: false
                type: boolean

env:
    # Template safety switch. Change this to `true` in a real package after
    # configuring the `crates-io` environment and `CARGO_REGISTRY_TOKEN` secret.
    PUBLISH_TO_CRATES_IO: "false"

jobs:
    verify:
        runs-on: ubuntu-latest
        outputs:
            publish_enabled: ${{ steps.publish_gate.outputs.enabled }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ inputs.tag_name }}

            - name: Install Rust
              uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
              with:
                  toolchain: stable

            - name: Cache Cargo
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

            - name: Verify crate version matches tag
              run: |
                  EXPECTED_VERSION="${{ inputs.tag_name }}"
                  EXPECTED_VERSION="${EXPECTED_VERSION#v}"
                  ACTUAL_VERSION=$(
                    cargo metadata --no-deps --format-version 1 |
                      python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])'
                  )
                  if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
                    echo "Cargo.toml version $ACTUAL_VERSION does not match tag ${{ inputs.tag_name }}." >&2
                    exit 1
                  fi

            - name: Verify package
              run: cargo package

            - name: Evaluate publish gate
              id: publish_gate
              run: |
                  if [ "${PUBLISH_TO_CRATES_IO}" = "true" ] && [ "${{ inputs.publish }}" = "true" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Skip publish
              if: ${{ steps.publish_gate.outputs.enabled != 'true' }}
              run: |
                  echo "Publishing is disabled for this template." >> "$GITHUB_STEP_SUMMARY"
                  echo "Set PUBLISH_TO_CRATES_IO to true and pass publish=true to enable crates.io publishing." >> "$GITHUB_STEP_SUMMARY"

    publish:
        needs: verify
        if: ${{ needs.verify.outputs.publish_enabled == 'true' }}
        runs-on: ubuntu-latest
        environment: crates-io
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ inputs.tag_name }}

            - name: Install Rust
              uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
              with:
                  toolchain: stable

            - name: Cache Cargo
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

            - name: Verify crate version matches tag
              run: |
                  EXPECTED_VERSION="${{ inputs.tag_name }}"
                  EXPECTED_VERSION="${EXPECTED_VERSION#v}"
                  ACTUAL_VERSION=$(
                    cargo metadata --no-deps --format-version 1 |
                      python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])'
                  )
                  if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
                    echo "Cargo.toml version $ACTUAL_VERSION does not match tag ${{ inputs.tag_name }}." >&2
                    exit 1
                  fi

            - name: Publish crate
              run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
